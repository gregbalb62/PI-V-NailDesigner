version: '3.8'
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - db
      - mqtt
  db:
    image: mysql:8
    environment:
      MYSQL_DATABASE: iot
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
  mqtt:
    image: eclipse-mosquitto
    ports:
      - "1883:1883"
